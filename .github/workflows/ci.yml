name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DEBUG: "False"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_DATABASE: matr_db
      SECRET: ci-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: python -m pip install poetry==2.4.1

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Compile Python files
        run: python -m compileall .

      - name: Import FastAPI app
        run: python -c "from main import create_app; create_app()"

      - name: Check Alembic configuration
        run: alembic -c alembic.ini history

  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      DEBUG: "False"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: matr_db
      DB_PORT: "5432"
      DB_DATABASE: matr_db
      SECRET: ci-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create safe CI environment file
        run: |
          {
            echo "DEBUG=False"
            echo "DB_USER=postgres"
            echo "DB_PASSWORD=postgres"
            echo "DB_HOST=matr_db"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=matr_db"
            echo "SECRET=ci-secret"
          } > .env

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build backend image
        run: docker compose build backend

      - name: Build frontend image
        run: docker compose build frontend
